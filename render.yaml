services:
  - type: web
    name: bozok-financial-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bozok-dashboard-db
          property: connectionString

databases:
  - name: bozok-dashboard-db
    plan: free
    databaseName: bozok_dashboard
    user: bozok_dashboard
