services:
  - type: web
    name: bozok-financial-dashboard
    runtime: node
    plan: free
    buildCommand: npm install && npx playwright install chromium
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MOON_AUTOMATION_ENABLED
        value: "0"
      - key: MOON_USERNAME
        sync: false
      - key: MOON_PASSWORD
        sync: false
      - key: MOON_TOTP_SECRET
        sync: false
      - key: MOON_AUTOMATION_INTERVAL_MS
        value: "1000"
      - key: MOON_HEADLESS
        value: "1"
      - key: EXCEL_CENTER_ENABLED
        value: "1"
      - key: EXCEL_CENTER_PRIMARY
        value: "0"
      - key: EXCEL_KASA_DIRECT_ENABLED
        value: "1"
      - key: EXCEL_KASA_TARGET_SHEET
        sync: false
      - key: MS_TENANT_ID
        value: consumers
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_REFRESH_TOKEN
        sync: false
      - key: MS_GRAPH_SCOPES
        value: offline_access Files.ReadWrite User.Read
      - key: EXCEL_WORKBOOK_SHARE_URL
        sync: false
      - key: EXCEL_WORKBOOK_DRIVE_ID
        sync: false
      - key: EXCEL_WORKBOOK_ITEM_ID
        sync: false
      - key: EXCEL_SYNC_MIN_MS
        value: "1000"
      - key: ONEDRIVE_CENTER_ENABLED
        value: "0"
      - key: ONEDRIVE_CENTER_PRIMARY
        value: "0"
      - key: ONEDRIVE_CENTER_DIR
        sync: false
      - key: ONEDRIVE_SYNC_MIN_MS
        value: "500"
      - key: DATABASE_URL
        fromDatabase:
          name: bozok-dashboard-db
          property: connectionString

databases:
  - name: bozok-dashboard-db
    plan: free
    databaseName: bozok_dashboard
    user: bozok_dashboard
