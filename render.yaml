services:
  - type: web
    name: bozok-financial-dashboard
    runtime: node
    plan: free
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=0 npm install && PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MOON_AUTOMATION_ENABLED
        value: "1"
      - key: MOON_USERNAME
        sync: false
      - key: MOON_PASSWORD
        sync: false
      - key: MOON_TOTP_SECRET
        sync: false
      - key: MOON_AUTOMATION_INTERVAL_MS
        value: "1000"
      - key: MOON_FETCH_TIMEOUT_MS
        value: "10000"
      - key: MOON_TRANSACTIONS_LIMIT
        value: "500"
      - key: MOON_TRANSACTIONS_MAX_PAGES
        value: "3"
      - key: MOON_DEPOSIT_PAGINATION_ENABLED
        value: "0"
      - key: MOON_DEPOSIT_BACKGROUND_ENABLED
        value: "1"
      - key: MOON_DEPOSIT_BACKGROUND_DISABLED
        value: "0"
      - key: MOON_DEPOSIT_BACKGROUND_REFRESH_MS
        value: "45000"
      - key: MOON_DEPOSIT_BACKGROUND_MAX_PAGES
        value: "20"
      - key: MOON_DEPOSIT_APPROVED_STATUSES
        value: "approved,completed,onaylandi,onaylandı,success,succeeded"
      - key: MOON_DETAIL_REFRESH_MS
        value: "60000"
      - key: MOON_INITIAL_DETAIL_WAIT_MS
        value: "0"
      - key: MOON_WITHDRAWAL_DETAIL_API_LIMIT
        value: "10"
      - key: MOON_BROWSER_FETCH_FALLBACK
        value: "1"
      - key: MOON_MAX_CONSECUTIVE_ERRORS
        value: "3"
      - key: MOON_STALE_RESTART_MS
        value: "15000"
      - key: MOON_MIN_RESTART_GAP_MS
        value: "10000"
      - key: MOON_PAGE_HEARTBEAT_MS
        value: "30000"
      - key: MOON_HEADLESS
        value: "1"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: EXCEL_CENTER_ENABLED
        value: "1"
      - key: EXCEL_CENTER_PRIMARY
        value: "0"
      - key: EXCEL_KASA_DIRECT_ENABLED
        value: "1"
      - key: EXCEL_KASA_TARGET_SHEET
        sync: false
      - key: MS_TENANT_ID
        value: consumers
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_REFRESH_TOKEN
        sync: false
      - key: MS_GRAPH_SCOPES
        value: offline_access Files.ReadWrite User.Read
      - key: EXCEL_WORKBOOK_SHARE_URL
        sync: false
      - key: EXCEL_WORKBOOK_DRIVE_ID
        sync: false
      - key: EXCEL_WORKBOOK_ITEM_ID
        sync: false
      - key: EXCEL_SYNC_MIN_MS
        value: "1000"
      - key: ONEDRIVE_CENTER_ENABLED
        value: "0"
      - key: ONEDRIVE_CENTER_PRIMARY
        value: "0"
      - key: ONEDRIVE_CENTER_DIR
        sync: false
      - key: ONEDRIVE_SYNC_MIN_MS
        value: "500"
      - key: DATABASE_URL
        fromDatabase:
          name: bozok-dashboard-db
          property: connectionString
      - key: DATABASE_RETRY_DELAY_MS
        value: "10000"
      - key: DATABASE_CONNECT_TIMEOUT_MS
        value: "15000"
      - key: DATABASE_QUERY_TIMEOUT_MS
        value: "30000"
      - key: DATABASE_STATEMENT_TIMEOUT_MS
        value: "30000"
      - key: DATABASE_SSL
        value: "auto"

databases:
  - name: bozok-dashboard-db
    plan: free
    databaseName: bozok_dashboard
    user: bozok_dashboard
