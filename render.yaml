services:
  - type: web
    name: bozok-financial-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
  - type: worker
    name: bozok-telegram-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run bot
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DASHBOARD_STATE_URL
        value: https://bozok-financial-dashboard.onrender.com
