services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bozok_dashboard
      POSTGRES_USER: bozok
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD zorunlu}
    volumes:
      - bozok-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bozok -d bozok_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-10000}:10000"
    env_file:
      - .env
    environment:
      PORT: 10000
      BOZOK_DATA_DIR: /data
      DATABASE_URL: postgres://bozok:${POSTGRES_PASSWORD}@db:5432/bozok_dashboard
      DATABASE_RETRY_DELAY_MS: 5000
      DATABASE_CONNECT_TIMEOUT_MS: 5000
      DATABASE_QUERY_TIMEOUT_MS: 5000
      REQUIRE_DATABASE: 1
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - bozok-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:10000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  bozok-postgres:
  bozok-data:
